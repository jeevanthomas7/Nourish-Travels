<section id="contact" class="py-20 px-4 sm:px-6 lg:px-8 bg-brand-lightblue">
  <div class="max-w-7xl mx-auto">
    <div class="bg-white rounded-3xl p-8 sm:p-12 lg:p-16">

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">

     
        <div>
          <p class="text-brand-blue text-xs font-semibold tracking-widest uppercase mb-4">Contacts</p>

          <h2 class="text-3xl sm:text-4xl font-extrabold text-brand-dark mb-4">
            Get in touch <span class="text-brand-yellow">+</span>
          </h2>

          <p class="text-brand-gray text-sm sm:text-base leading-relaxed mb-8 max-w-sm">
            We're here to help you embark on your next adventure! Fill out the form or drop us an email.
          </p>

          <div class="flex flex-col gap-4">
            <div class="flex items-center gap-3 text-brand-gray text-sm">
              <div class="w-8 h-8 flex items-center justify-center bg-brand-lightblue rounded-full flex-shrink-0">📍</div>
              <span>Am Eichenbach-1, Berlin, Germany</span>
            </div>
            <div class="flex items-center gap-3 text-brand-gray text-sm">
              <div class="w-8 h-8 flex items-center justify-center bg-brand-lightblue rounded-full flex-shrink-0">✉️</div>
              <span>contact@nourish.ui</span>
            </div>
          </div>
        </div>

        <div>
          <form id="contactForm">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
            <div>
              <label class="block text-xs font-semibold text-brand-gray mb-1 uppercase tracking-wide">First Name</label>
              <input type="text" placeholder="First name"
                     class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-blue transition" />
            </div>
            <div>
              <label class="block text-xs font-semibold text-brand-gray mb-1 uppercase tracking-wide">Last Name</label>
              <input type="text" placeholder="Last name"
                     class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-blue transition" />
            </div>
          </div>

          <div class="mb-4">
            <label class="block text-xs font-semibold text-brand-gray mb-1 uppercase tracking-wide">Email</label>
            <input type="email" placeholder="Your email"
                   class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-blue transition" />
          </div>

          <div class="mb-6">
            <label class="block text-xs font-semibold text-brand-gray mb-1 uppercase tracking-wide">Message</label>
            <textarea rows="5" placeholder="Write your thoughts here..."
                      class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-blue transition resize-none"></textarea>
          </div>

       <button type="button" onclick="document.getElementById('contactForm').reset()"
        class="w-full sm:w-auto bg-brand-blue text-white font-semibold text-sm px-8 py-3.5 rounded-full hover:bg-blue-700 active:scale-95 transition-all duration-200">
  Send message →
</button>
</form>

      </div>
    </div>
  </div>
</section>
